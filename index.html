<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Paint Game</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; }
        body { background: #1a1a1a; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: Arial; }
        .container { background: #2c2c2c; border-radius: 24px; padding: 12px; }
        canvas { background: white; border-radius: 16px; display: block; cursor: crosshair; touch-action: none; }
        .tools { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; justify-content: center; }
        .btn { background: #3a3a3a; border: none; border-radius: 40px; padding: 10px 18px; font-size: 14px; color: white; cursor: pointer; }
        .color { width: 44px; height: 44px; border-radius: 50%; cursor: pointer; border: 2px solid white; }
        .colors { display: flex; gap: 10px; justify-content: center; margin-top: 12px; }
        .size { background: #3a3a3a; padding: 8px 16px; border-radius: 40px; color: white; display: flex; align-items: center; gap: 10px; }
        input { width: 120px; }
        .info { text-align: center; color: #aaa; font-size: 11px; margin-top: 12px; }
    </style>
</head>
<body>
<div class="container">
    <canvas id="canvas" width="500" height="400"></canvas>
    <div class="tools">
        <div class="size">✏️ <input type="range" id="size" min="2" max="30" value="5"><span id="sizeVal">5</span></div>
        <button class="btn" id="clear">🗑 Очистить</button>
        <button class="btn" id="save">💾 Сохранить</button>
    </div>
    <div class="colors">
        <div class="color" style="background:#000"></div>
        <div class="color" style="background:#f00"></div>
        <div class="color" style="background:#0f0"></div>
        <div class="color" style="background:#00f"></div>
        <div class="color" style="background:#ff0"></div>
        <div class="color" style="background:#f80"></div>
        <div class="color" style="background:#f4f"></div>
        <div class="color" style="background:#fff"></div>
    </div>
    <div class="tools">
        <button class="btn" id="smile">😊 Смайлик</button>
        <button class="btn" id="heart">❤️ Сердце</button>
        <button class="btn" id="star">⭐ Звезда</button>
    </div>
    <div class="info">🖌️ Зажми палец и води по холсту</div>
</div>
<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let painting = false;
    let color = '#000';
    let size = 5;
    
    ctx.fillStyle = '#fff';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    function getXY(e) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        let x, y;
        if (e.touches) {
            x = (e.touches[0].clientX - rect.left) * scaleX;
            y = (e.touches[0].clientY - rect.top) * scaleY;
        } else {
            x = (e.clientX - rect.left) * scaleX;
            y = (e.clientY - rect.top) * scaleY;
        }
        return { x: Math.min(Math.max(0,x), canvas.width), y: Math.min(Math.max(0,y), canvas.height) };
    }
    
    function start(e) { e.preventDefault(); painting = true; let p = getXY(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p.x, p.y); ctx.stroke(); }
    function draw(e) { if (!painting) return; e.preventDefault(); let p = getXY(e); ctx.strokeStyle = color; ctx.lineWidth = size; ctx.lineCap = 'round'; ctx.lineTo(p.x, p.y); ctx.stroke(); ctx.beginPath(); ctx.moveTo(p.x, p.y); }
    function stop(e) { painting = false; ctx.beginPath(); }
    
    canvas.addEventListener('mousedown', start);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseup', stop);
    canvas.addEventListener('touchstart', start);
    canvas.addEventListener('touchmove', draw);
    canvas.addEventListener('touchend', stop);
    
    document.querySelectorAll('.color').forEach(c => c.addEventListener('click', () => { color = c.style.background; }));
    document.getElementById('size').oninput = (e) => { size = e.target.value; document.getElementById('sizeVal').innerText = size; };
    document.getElementById('clear').onclick = () => { ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, canvas.width, canvas.height); };
    document.getElementById('save').onclick = () => { let a = document.createElement('a'); a.href = canvas.toDataURL(); a.download = 'draw.png'; a.click(); };
    document.getElementById('smile').onclick = () => { drawTemplate('smile'); };
    document.getElementById('heart').onclick = () => { drawTemplate('heart'); };
    document.getElementById('star').onclick = () => { drawTemplate('star'); };
    
    function drawTemplate(t) {
        ctx.fillStyle = '#fff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = color;
        let cx = canvas.width/2, cy = canvas.height/2;
        if (t === 'smile') {
            ctx.beginPath(); ctx.arc(cx, cy-20, 100, 0, 2*Math.PI); ctx.stroke();
            ctx.beginPath(); ctx.arc(cx-40, cy-50, 15, 0, 2*Math.PI); ctx.fill();
            ctx.beginPath(); ctx.arc(cx+40, cy-50, 15, 0, 2*Math.PI); ctx.fill();
            ctx.beginPath(); ctx.arc(cx, cy+10, 40, 0.1, Math.PI-0.1); ctx.stroke();
        } else if (t === 'heart') {
            ctx.beginPath();
            ctx.moveTo(cx, cy+40);
            ctx.bezierCurveTo(cx, cy+40, cx-80, cy-40, cx, cy);
            ctx.bezierCurveTo(cx+80, cy-40, cx, cy+40, cx, cy+40);
            ctx.fill();
        } else if (t === 'star') {
            let spikes=5, outer=70, inner=35, step=Math.PI/spikes, rot=Math.PI/2*3;
            ctx.beginPath();
            for(let i=0; i<spikes; i++) {
                let x1 = cx + Math.cos(rot+i*step)*outer;
                let y1 = cy-30 + Math.sin(rot+i*step)*outer;
                let x2 = cx + Math.cos(rot+(i+0.5)*step)*inner;
                let y2 = cy-30 + Math.sin(rot+(i+0.5)*step)*inner;
                if(i==0) ctx.moveTo(x1,y1); else ctx.lineTo(x1,y1);
                ctx.lineTo(x2,y2);
            }
            ctx.closePath(); ctx.fill();
        }
    }
</script>
</body>
</html>
